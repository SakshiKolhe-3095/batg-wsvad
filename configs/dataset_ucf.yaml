# configs/dataset_ucf.yaml
# UCF-Crime dataset paths + splits.
# Feature source: DeepMIL / Roc-Ng (NOT RTFM broken links).
# Shape per .npy: (T, 10, 1024), T range 18-1779, mean ~243.

name: ucf-crime

paths:
  train_list: data/features/ucf-crime/i3d_merged/list/ucf-i3d.list
  test_list:  data/features/ucf-crime/i3d_merged/list/ucf-i3d-test.list
  gt_file:    baselines/accuracy_baselines/rtfm2021/list/gt-ucf.npy

splits:
  n_videos_train: 1610
  n_videos_test: 290
  n_abnormal_train: 810     # index 0-809 = abnormal
  n_normal_train: 800       # index 810-1609 = normal
  # split boundary: Vandalism050 -> Normal_Videos001 at 809->810

loader:
  n_segments: 32
  mean_crop: true           # (T,10,1024) -> (T,1024)
  num_workers: 0            # Windows. Raise on Linux.
  # label rule: "Normal_Videos" in name -> 0, else -> 1